name: Daily V5 Quant Model Run
on:
  workflow_dispatch:
  schedule:
    - cron: '30 22 * * 1-5'
jobs:
  run-model:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python run_daily.py
